<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Shop | Cart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold text-uppercase" href="index.html">
                <span class="fs-4 bg-primary text-white px-3 py-1 rounded-3">S</span>
                <span class="fs-4 logo-text">Shop</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <div class="links d-flex gap-4 mx-auto my-3 my-lg-0">
                    <a href="index.html">Home</a>
                    <a href="product.html">Product</a>
                    <a href="cart.html" class="active">Cart</a>
                </div>
                <div class="d-flex align-items-center gap-4">
                    <a href="cart.html" class="position-relative text-primary fs-4">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger badge-cart">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h1 class="fw-bold mb-5">Your Cart</h1>

        <div class="row g-5" id="cart-content-wrapper">
            <div class="col-lg-8">
                <div id="cart-items" class="d-flex flex-column gap-3"></div>
            </div>
            
            <div class="col-lg-4">
                <div class="checkout-summary-card shadow-sm">
                    <h5 class="fw-bold mb-4">Order Summary</h5>
                    <div class="d-flex justify-content-between mb-3 text-muted">
                        <span>Subtotal</span>
                        <span id="subtotal-price">$0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3 text-muted">
                        <span>Shipping</span>
                        <span id="shipping-price">$0.00</span>
                    </div>
                    <hr class="my-4">
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-bold fs-5 text-uppercase">Total</span>
                        <span class="fw-bold fs-5 text-primary" id="total-price">$0.00</span>
                    </div>
                    <button class="btn btn-primary btn-lg w-100 rounded-pill mb-3" onclick="simulateCheckout()">Proceed to Checkout</button>
                    <a href="product.html" class="btn btn-outline-secondary w-100 rounded-pill text-black">Continue Shopping</a>
                </div>
            </div>
        </div>

        <div id="empty-state" class="text-center empty-state d-none">
            <div class="empty-icon"><i class="fa-solid fa-inbox"></i></div>
            <h3 class="fw-bold">Your cart is currently empty</h3>
            <p class="text-muted mb-4">Browse our premium collection and start adding items you love!</p>
            <a href="product.html" class="btn btn-primary rounded-pill px-5 py-3">Start Shopping</a>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="cart.js"></script>
</body>
</html>
